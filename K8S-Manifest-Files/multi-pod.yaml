apiVersion: v1
kind: Pod
metadata:
  name: multi-pod
spec:
  containers:
    -  name: grocery-app
       image: anushanayak091/turbo-grocery-app:V4.3.0
       ports:
        -  containerPort: 80
    -  name: java-app
       image: anushanayak091/java-web-app:v1.0.0
       ports:
        -  containerPort: 8080