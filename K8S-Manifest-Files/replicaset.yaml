apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: flower-app-rs
  labels:
    app: web
spec: #Defines the behaviour of the replicaset
  replicas: 3
  selector:
    matchLables:
      web: flower
  template:
    metadata:
      labels: 
        web: flower
    spec: #Defines the behaviour of the Pod
      containers: 
        -  image: <image-name from hub>
           name: sre-web
           ports:
            -  containerPort: 3015